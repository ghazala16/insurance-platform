---
# Backend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: insureflow-backend
  namespace: insureflow
  labels:
    app: insureflow-backend
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: insureflow-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0   # Zero-downtime deploys
  template:
    metadata:
      labels:
        app: insureflow-backend
    spec:
      containers:
        - name: backend
          image: insureflowacr.azurecr.io/insureflow-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: insureflow-secrets
                  key: mongodb-uri
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: insureflow-secrets
                  key: jwt-secret
            - name: AZURE_SERVICE_BUS_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: insureflow-secrets
                  key: service-bus-connection-string
            - name: CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: insureflow-config
                  key: cors-origins
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
---
# Backend Service
apiVersion: v1
kind: Service
metadata:
  name: insureflow-backend-svc
  namespace: insureflow
spec:
  selector:
    app: insureflow-backend
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
---
# HorizontalPodAutoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: insureflow-backend-hpa
  namespace: insureflow
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: insureflow-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
