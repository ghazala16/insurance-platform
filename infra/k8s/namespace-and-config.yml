---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: insureflow
  labels:
    app: insureflow
---
# ConfigMap (non-sensitive config)
apiVersion: v1
kind: ConfigMap
metadata:
  name: insureflow-config
  namespace: insureflow
data:
  cors-origins: "https://insureflow.example.com"
  policy-queue-name: "policy-processing-queue"
---
# Secret template (replace base64 values before applying)
# Generate base64: echo -n "your-value" | base64
apiVersion: v1
kind: Secret
metadata:
  name: insureflow-secrets
  namespace: insureflow
type: Opaque
stringData:
  mongodb-uri: ${MONGODB_URI}
  jwt-secret: ${JWT_SECRET}
  service-bus-connection-string: ${SERVICE_BUS_CONNECTION_STRING}