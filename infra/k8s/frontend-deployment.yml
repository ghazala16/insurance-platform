---
# Frontend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: insureflow-frontend
  namespace: insureflow
  labels:
    app: insureflow-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: insureflow-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: insureflow-frontend
    spec:
      containers:
        - name: frontend
          image: insureflowacr.azurecr.io/insureflow-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
# Frontend Service
apiVersion: v1
kind: Service
metadata:
  name: insureflow-frontend-svc
  namespace: insureflow
spec:
  selector:
    app: insureflow-frontend
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
---
# Ingress (Azure Application Gateway / nginx-ingress)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: insureflow-ingress
  namespace: insureflow
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - insureflow.example.com
      secretName: insureflow-tls
  rules:
    - host: insureflow.example.com
      http:
        paths:
          - path: /api/
            pathType: Prefix
            backend:
              service:
                name: insureflow-backend-svc
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: insureflow-frontend-svc
                port:
                  number: 80
