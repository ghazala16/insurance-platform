version: '3.9'

services:
  # ── MongoDB ─────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: insureflow-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: adminpass
      MONGO_INITDB_DATABASE: insurancedb
    volumes:
      - mongo_data:/data/db
      - ./init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    networks:
      - insureflow-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot Backend ─────────────────────────────────
  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: insureflow-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      MONGODB_URI: mongodb://admin:adminpass@mongodb:27017/insurancedb?authSource=admin
      MONGODB_DATABASE: insurancedb
      JWT_SECRET: "insureflow-super-secret-key-for-dev-only-32chars!!"
      CORS_ORIGINS: "http://localhost:4200,http://localhost:80"
      # Azure Service Bus (optional — leave blank for local async fallback)
      AZURE_SERVICE_BUS_CONNECTION_STRING: ""
      POLICY_QUEUE_NAME: "policy-processing-queue"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - insureflow-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Angular Frontend ────────────────────────────────────
  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    container_name: insureflow-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - insureflow-net

  # ── Mongo Express (Dev UI) ──────────────────────────────
  mongo-express:
    image: mongo-express:1.0
    container_name: insureflow-mongo-ui
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: adminpass
      ME_CONFIG_MONGODB_URL: mongodb://admin:adminpass@mongodb:27017/
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - insureflow-net

volumes:
  mongo_data:

networks:
  insureflow-net:
    driver: bridge
