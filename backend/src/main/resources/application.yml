spring:
  application:
    name: insurance-platform

  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/insurancedb}
      database: ${MONGODB_DATABASE:insurancedb}

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OAUTH2_ISSUER_URI:}  # Azure AD or Okta issuer

server:
  port: ${PORT:8080}
  error:
    include-message: never
    include-stacktrace: never

# JWT Configuration
app:
  jwt:
    secret: ${JWT_SECRET:your-256-bit-secret-key-change-in-production-minimum-32-chars}
    access-token-expiry: 900000       # 15 minutes
    refresh-token-expiry: 604800000   # 7 days

  # Azure Service Bus
  azure:
    service-bus:
      connection-string: ${AZURE_SERVICE_BUS_CONNECTION_STRING:}
      policy-queue-name: ${POLICY_QUEUE_NAME:policy-processing-queue}

  # CORS
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:4200}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  info:
    env:
      enabled: true

# Logging
logging:
  level:
    com.swissre.insurance: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha

info:
  app:
    name: InsureFlow
    version: 1.0.0
    description: Cloud-native insurance policy management platform
