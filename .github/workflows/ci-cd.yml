name: CI/CD — Build, Test & Deploy to Azure

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: insureflowacr.azurecr.io
  BACKEND_IMAGE: insureflow-backend
  FRONTEND_IMAGE: insureflow-frontend
  AKS_CLUSTER: insureflow-aks
  AKS_RG: insurance-rg
  K8S_NAMESPACE: insureflow

jobs:
  # ─────────────────────────────────────────────────────────
  # JOB 1: Test Backend
  # ─────────────────────────────────────────────────────────
  test-backend:
    name: 🧪 Test Backend
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:6
        ports:
          - 27017:27017
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: mvn test --no-transfer-progress

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: backend/target/surefire-reports/

  # ─────────────────────────────────────────────────────────
  # JOB 2: Test Frontend
  # ─────────────────────────────────────────────────────────
  test-frontend:
    name: 🧪 Test Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production
        run: npm run build -- --configuration production

  # ─────────────────────────────────────────────────────────
  # JOB 3: Build & Push Docker Images (main branch only)
  # ─────────────────────────────────────────────────────────
  build-and-push:
    name: 🐳 Build & Push Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set image tag (short SHA)
        id: meta
        run: echo "TAG=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Build & push backend image
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.TAG }} \
                       -t ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest \
                       ./backend
          docker push ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.TAG }}
          docker push ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest

      - name: Build & push frontend image
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.TAG }} \
                       -t ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:latest \
                       ./frontend
          docker push ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.TAG }}
          docker push ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:latest

    outputs:
      image-tag: ${{ steps.meta.outputs.TAG }}

  # ─────────────────────────────────────────────────────────
  # JOB 4: Deploy to AKS
  # ─────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Azure AKS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ env.AKS_RG }}
          cluster-name: ${{ env.AKS_CLUSTER }}

      - name: Create namespace
        run: kubectl create namespace insureflow --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply manifests
        run: |
          kubectl apply -f infra/k8s/namespace-and-config.yml
          kubectl apply -f infra/k8s/backend-deployment.yml -n insureflow
          kubectl apply -f infra/k8s/frontend-deployment.yml -n insureflow

      - name: Update backend image
        run: |
          kubectl set image deployment/insureflow-backend \
            backend=${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ needs.build-and-push.outputs.image-tag }} \
            --namespace ${{ env.K8S_NAMESPACE }}

      - name: Update frontend image
        run: |
          kubectl set image deployment/insureflow-frontend \
            frontend=${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ needs.build-and-push.outputs.image-tag }} \
            --namespace ${{ env.K8S_NAMESPACE }}

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/insureflow-backend --namespace ${{ env.K8S_NAMESPACE }} --timeout=120s
          kubectl rollout status deployment/insureflow-frontend --namespace ${{ env.K8S_NAMESPACE }} --timeout=60s

      - name: Show deployment status
        if: always()
        run: |
          echo "=== Pods ==="
          kubectl get pods --namespace ${{ env.K8S_NAMESPACE }}
          echo "=== Services ==="
          kubectl get services --namespace ${{ env.K8S_NAMESPACE }}
